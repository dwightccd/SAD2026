<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAD — Práctica de Tests</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #00e5b0;
    --accent2: #ff5c5c;
    --accent3: #ffd166;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --correct: #00e5b0;
    --wrong: #ff5c5c;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .score-display {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    gap: 24px;
  }

  .score-display span b {
    color: var(--text);
    font-weight: 700;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 66px;
    z-index: 99;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b8ff);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* MAIN */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 0;
  }

  /* MODULE SELECTOR */
  #module-selector {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-top: 16px;
  }

  .module-header {
    margin-bottom: 16px;
  }

  .module-header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .module-header p {
    color: var(--muted);
    font-size: 14px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s;
  }

  .module-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }

  .module-card .mod-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .module-card h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .module-card .mod-count {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .btn-all {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    padding: 16px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-transform: uppercase;
  }

  .btn-all:hover { background: #00ffc9; transform: translateY(-1px); }

  /* QUIZ */
  #quiz-screen { display: none; }

  .question-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .question-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .module-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(0, 229, 176, 0.1);
    border: 1px solid rgba(0, 229, 176, 0.25);
    border-radius: 4px;
    padding: 3px 8px;
    letter-spacing: 1px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 32px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.5;
  }

  .option-btn .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 16px;
    padding-top: 3px;
    transition: color 0.15s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .option-btn:hover:not(:disabled) .opt-letter {
    color: var(--accent);
  }

  .option-btn.selected {
    border-color: #4a90d9;
    background: rgba(74, 144, 217, 0.08);
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(0, 229, 176, 0.08);
    animation: pulse-correct 0.4s ease;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255, 92, 92, 0.08);
    animation: shake 0.4s ease;
  }

  .option-btn.show-correct {
    border-color: var(--correct);
    background: rgba(0, 229, 176, 0.05);
    opacity: 0.7;
  }

  .option-btn.correct .opt-letter { color: var(--correct); }
  .option-btn.wrong .opt-letter { color: var(--wrong); }
  .option-btn.show-correct .opt-letter { color: var(--correct); }

  @keyframes pulse-correct {
    0% { transform: scale(1); }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* FEEDBACK */
  .feedback-box {
    display: none;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    border: 1px solid;
    line-height: 1.5;
  }

  .feedback-box.correct-fb {
    border-color: rgba(0, 229, 176, 0.3);
    background: rgba(0, 229, 176, 0.06);
    color: var(--correct);
  }

  .feedback-box.wrong-fb {
    border-color: rgba(255, 92, 92, 0.3);
    background: rgba(255, 92, 92, 0.06);
    color: var(--text);
  }

  .feedback-box .fb-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .feedback-box.correct-fb .fb-label { color: var(--correct); }
  .feedback-box.wrong-fb .fb-label { color: var(--wrong); }

  .nav-buttons {
    display: flex;
    gap: 12px;
  }

  .btn-next {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    padding: 14px 28px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: none;
  }

  .btn-next:hover { background: #00ffc9; transform: translateY(-1px); }

  .btn-skip {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-skip:hover { color: var(--text); border-color: var(--muted); }

  .btn-back {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-back:hover { color: var(--text); border-color: var(--muted); }

  /* RESULTS */
  #results-screen {
    display: none;
    text-align: center;
    padding: 48px 0;
  }

  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    position: relative;
  }

  .result-circle::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 176, 0.15);
  }

  .result-pct {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }

  .result-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    margin-bottom: 8px;
  }

  .result-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 40px;
    text-align: center;
  }

  .breakdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .breakdown-num {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .breakdown-num.correct { color: var(--correct); }
  .breakdown-num.wrong { color: var(--wrong); }
  .breakdown-num.neutral { color: var(--muted); }

  .breakdown-label {
    font-size: 12px;
    color: var(--muted);
  }

  .result-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-retry {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius);
    padding: 14px 28px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-retry:hover { background: #00ffc9; }

  .btn-menu {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-menu:hover { color: var(--text); border-color: var(--muted); }

  /* WRONG REVIEW */
  .wrong-review {
    margin-top: 40px;
    text-align: left;
  }

  .wrong-review h3 {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--wrong);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .wrong-item {
    background: var(--surface);
    border: 1px solid rgba(255, 92, 92, 0.2);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 10px;
    font-size: 14px;
  }

  .wrong-item .wi-question {
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }

  .wrong-item .wi-your {
    color: var(--wrong);
    font-size: 12px;
    margin-bottom: 4px;
  }

  .wrong-item .wi-correct {
    color: var(--correct);
    font-size: 12px;
  }

  /* Question enter animation */
  .question-enter {
    animation: slideIn 0.3s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    main { padding: 32px 16px 0; }
    .result-breakdown { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .breakdown-card { padding: 14px 10px; }
    .breakdown-num { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SAD // Tests</div>
  <div class="score-display" id="header-score" style="display:none">
    <span>✓ <b id="h-correct">0</b></span>
    <span>✗ <b id="h-wrong">0</b></span>
    <span><b id="h-current">0</b>/<b id="h-total">0</b></span>
  </div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar"></div></div>

<main>

  <!-- MODULE SELECTOR -->
  <div id="module-selector">
    <div class="module-header">
      <h1>Práctica de Tests</h1>
      <p>Selecciona un módulo para practicar o practica todos a la vez</p>
    </div>
    <button class="btn-all" onclick="startQuiz('all')">▶ Practicar todos los módulos</button>
    <div id="module-list"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="question-meta">
      <div class="question-num" id="q-num">PREGUNTA 1 / 10</div>
      <div class="module-tag" id="q-module">SAD01</div>
    </div>
    <div class="question-text question-enter" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="fb-label" id="fb-label"></div>
      <div id="fb-text"></div>
    </div>
    <div class="nav-buttons">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
      <button class="btn-skip" id="btn-skip" onclick="skipQuestion()">Saltar</button>
      <button class="btn-back" onclick="goBack()">← Menú</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <div class="result-circle">
      <div class="result-pct" id="res-pct">0%</div>
      <div class="result-label">nota</div>
    </div>
    <div class="result-title" id="res-title">Resultado</div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-breakdown">
      <div class="breakdown-card"><div class="breakdown-num correct" id="res-correct">0</div><div class="breakdown-label">Correctas</div></div>
      <div class="breakdown-card"><div class="breakdown-num wrong" id="res-wrong">0</div><div class="breakdown-label">Incorrectas</div></div>
      <div class="breakdown-card"><div class="breakdown-num neutral" id="res-skip">0</div><div class="breakdown-label">Saltadas</div></div>
    </div>
    <div class="result-actions">
      <button class="btn-retry" onclick="retryQuiz()">↺ Repetir</button>
      <button class="btn-retry" id="btn-review-wrong" onclick="startWrongReview()" style="display:none">✦ Repasar falladas</button>
      <button class="btn-menu" onclick="showMenu()">← Menú</button>
    </div>
    <div class="wrong-review" id="wrong-review"></div>
  </div>

</main>

<script>
const ALL_QUESTIONS = [
  // SAD01
  { module: 'SAD01', q: 'Existen organismos que se dedican a gestionar todo tipo de incidencias producidas por software, se denominan:', opts: ['CSIT','CERT','CGI','GERT'], correct: 1 },
  { module: 'SAD01', q: 'Las amenazas pueden ser:', opts: ['Físicas','Físicas y lógicas','Físicas o activas','Lógicas'], correct: 1 },
  { module: 'SAD01', q: 'La posibilidad de que se materialice o no una amenaza es:', opts: ['La definición de vulnerabilidad','Una definición de riesgo','La definición de ataque','La definición de impacto'], correct: 1 },
  { module: 'SAD01', q: 'La diferencia entre troyanos, virus y gusanos es:', opts: ['El gusano no debe esperar a que se ejecute ningún fichero','El troyano solamente ralentiza el sistema de red','El gusano no destruye','El troyano no causa ningún daño'], correct: 0 },
  { module: 'SAD01', q: 'La contraseña "12a3abcA" es más segura que "a%cEr2t". ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 0 },
  { module: 'SAD01', q: 'Riesgo para un sistema informático es lo mismo que amenaza. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 1 },
  { module: 'SAD01', q: 'Las auditorías de seguridad no están estandarizadas. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 1 },
  { module: 'SAD01', q: 'El DNI electrónico:', opts: ['Es una firma electrónica','Contiene una firma electrónica','Encripta la información','Es un certificado electrónico'], correct: 1 },
  { module: 'SAD01', q: 'Las backdoors son un tipo de malware:', opts: ['Que se instala en el sistema por contagio','Que es una variedad de virus','Que se instala solamente en servidores, facilitando la entrada de otros programas','Creado por los programadores de la aplicación'], correct: 3 },
  { module: 'SAD01', q: 'Un análisis forense se hace:', opts: ['Sobre un sistema infectado por un virus','Sobre un sistema destruido','Sobre un sistema en el que se ha producido una incidencia de seguridad','Sobre un sistema que no arranca'], correct: 2 },
  { module: 'SAD01', q: 'El mayor porcentaje de infecciones es el producido por:', opts: ['Troyanos','Virus','Adware','Gusanos'], correct: 0 },
  { module: 'SAD01', q: 'Aunque no haya vulnerabilidades sigue habiendo amenazas. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 1 },
  { module: 'SAD01', q: 'La criptografía:', opts: ['Ha surgido con la era de la informática','Tiene como objetivo descifrar la información','Cifra los datos','Comprime los datos'], correct: 2 },
  { module: 'SAD01', q: 'Un sistema simétrico es:', opts: ['Un sistema con dos claves','Un sistema con una clave','Más seguro que uno asimétrico','Un sistema con una clave privada y otra pública'], correct: 1 },
  { module: 'SAD01', q: 'El análisis de las vulnerabilidades del sistema puede hacerse on-line. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 0 },
  { module: 'SAD01', q: 'Un sistema es seguro si tiene las cualidades de:', opts: ['Fiabilidad, integridad, disponibilidad, confidencialidad y no repudio','Fiabilidad e integridad','Fiabilidad, integridad, disponibilidad, confidencialidad','Definidas en la regla ISO170002'], correct: 0 },
  { module: 'SAD01', q: 'Un bug es un tipo de malware creado de manera intencionada. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 1 },
  { module: 'SAD01', q: 'Uno de los pasos convenientes en el proceso de recuperación de datos es:', opts: ['No dañar el soporte donde se almacenan los datos','Duplicar los datos y trabajar con la copia','Utilizar salas limpias','Realizar el proceso con herramientas software'], correct: 1 },
  { module: 'SAD01', q: 'Las evidencias digitales:', opts: ['No se pueden recoger, hay que observarlas y describirlas','Permanecen mientras el sistema tenga alimentación eléctrica','Se pierden inmediatamente','Se pueden duplicar'], correct: 3 },
  { module: 'SAD01', q: 'Un grupo electrógeno:', opts: ['Necesita de la electricidad','Solamente se utiliza en instalaciones industriales grandes','Se alimenta de diesel','Utiliza cualquier tipo de combustible diferente de la electricidad'], correct: 3 },

  // SAD02
  { module: 'SAD02', q: 'El escaneo de puertos:', opts: ['Es un método empleado en un tipo de ataque','Es lo mismo que whois','Es un ataque activo','Es una vulnerabilidad'], correct: 0 },
  { module: 'SAD02', q: 'WPA es más seguro que WEP. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 0 },
  { module: 'SAD02', q: 'En un ataque, el protocolo responsable de alterar las tablas de enrutamiento es:', opts: ['ICMP','IP','SMTP','TCP'], correct: 0 },
  { module: 'SAD02', q: 'Los ataques de fuerza bruta siempre necesitan del diccionario para poder conseguir la clave buscada. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 1 },
  { module: 'SAD02', q: 'Cuando se emplean mecanismos de pago como PayPal:', opts: ['PayPal solamente conoce los datos del vendedor','Nadie conoce los datos bancarios de los intervinientes en la transacción','El comprador solamente revela sus datos al vendedor','El comprador solamente revela sus datos a PayPal'], correct: 3 },
  { module: 'SAD02', q: 'Un diccionario utilizado en un ataque de fuerza bruta:', opts: ['Contiene palabras muy específicas','Solamente contiene contraseñas de encriptación WPA','Contiene palabras o combinaciones de caracteres utilizados comúnmente como contraseñas','Es siempre necesario'], correct: 2 },
  { module: 'SAD02', q: 'Cross Site Scripting es lo mismo que CSS. ¿Verdadero o falso?', opts: ['Verdadero','Falso'], correct: 1 },
  { module: 'SAD02', q: 'La diferencia entre troyanos, virus y gusanos es:', opts: ['El gusano no destruye','El gusano no debe esperar a que se ejecute ningún fichero','El troyano no causa ningún daño','El troyano solamente ralentiza el sistema de red'], correct: 1 },

let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let skipCount = 0;
let answered = false;
let wrongItems = [];
let currentMode = 'all';
let currentPhase = 'initial';
let reviewRound = 0;
let pendingWrongQuestions = [];
let lastInitialPool = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function cloneQuestion(q) {
  return {
    module: q.module,
    q: q.q,
    opts: [...q.opts],
    correct: q.correct,
  };
}

function questionKey(q) {
  return `${q.module}|||${q.q}`;
}

function buildModuleSelector() {
  const list = document.getElementById('module-list');
  list.innerHTML = '';
  MODULES.forEach(mod => {
    const count = ALL_QUESTIONS.filter(q => q.module === mod).length;
    const card = document.createElement('div');
    card.className = 'module-card';
    card.innerHTML = `
      <div>
        <div class="mod-label">${mod}</div>
        <h3>${MODULE_NAMES[mod]}</h3>
      </div>
      <div class="mod-count">${count} preguntas</div>
    `;
    card.onclick = () => startQuiz(mod);
    list.appendChild(card);
  });
}

function startQuiz(mode) {
  currentMode = mode;
  currentPhase = 'initial';
  reviewRound = 0;
  const pool = mode === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.module === mode);
  lastInitialPool = pool.map(cloneQuestion);
  pendingWrongQuestions = [];
  setupRound(shuffle(pool.map(cloneQuestion)));
}

function setupRound(questionPool) {
  currentQuestions = questionPool;
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  skipCount = 0;
  wrongItems = [];

  document.getElementById('module-selector').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('header-score').style.display = 'flex';
  document.getElementById('btn-review-wrong').style.display = 'none';

  updateHeaderScore();
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  let prefix = currentPhase === 'initial' ? 'PREGUNTA' : `REPASO ${reviewRound} · PREGUNTA`;
  document.getElementById('q-num').textContent = `${prefix} ${currentIndex + 1} / ${total}`;
  document.getElementById('q-module').textContent = currentPhase === 'initial' ? q.module : `${q.module} · FALLADAS`;

  const qText = document.getElementById('q-text');
  qText.textContent = q.q;
  qText.className = 'question-text question-enter';

  const letters = ['a','b','c','d','e'];
  const optsDiv = document.getElementById('q-options');
  optsDiv.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}.</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optsDiv.appendChild(btn);
  });

  document.getElementById('feedback-box').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').style.display = currentPhase === 'initial' ? 'inline-block' : 'none';

  updateProgress();
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  const btns = document.querySelectorAll('.option-btn');

  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    if (i === idx && idx !== q.correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-box');
  const fbLabel = document.getElementById('fb-label');
  const fbText = document.getElementById('fb-text');

  if (idx === q.correct) {
    correctCount++;
    fb.className = 'feedback-box correct-fb';
    fbLabel.textContent = '✓ Correcto';
    fbText.textContent = `Respuesta: ${q.opts[q.correct]}`;
    fb.style.display = 'block';
  } else {
    wrongCount++;
    const item = { q: q.q, your: q.opts[idx], correct: q.opts[q.correct], module: q.module };
    wrongItems.push(item);

    if (currentPhase === 'initial') {
      pendingWrongQuestions.push(cloneQuestion(q));
    } else {
      pendingWrongQuestions.push(cloneQuestion(q));
    }

    fb.className = 'feedback-box wrong-fb';
    fbLabel.textContent = '✗ Incorrecto';
    fbText.textContent = `La respuesta correcta es: ${q.opts[q.correct]}`;
    fb.style.display = 'block';
  }

  updateHeaderScore();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function skipQuestion() {
  if (currentPhase !== 'initial') return;
  skipCount++;
  const q = currentQuestions[currentIndex];
  pendingWrongQuestions.push(cloneQuestion(q));
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function updateProgress() {
  const pct = currentQuestions.length === 0 ? 0 : (currentIndex / currentQuestions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateHeaderScore() {
  document.getElementById('h-correct').textContent = correctCount;
  document.getElementById('h-wrong').textContent = wrongCount;
  document.getElementById('h-current').textContent = currentQuestions.length === 0 ? 0 : Math.min(currentIndex + 1, currentQuestions.length);
  document.getElementById('h-total').textContent = currentQuestions.length;
}

function showResults() {
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('header-score').style.display = 'none';

  const total = currentQuestions.length;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-wrong').textContent = wrongCount;
  document.getElementById('res-skip').textContent = skipCount;

  let title = '';
  let sub = '';
  const reviewBtn = document.getElementById('btn-review-wrong');

  if (currentPhase === 'initial') {
    if (pct >= 90) { title = '¡Excelente!'; sub = 'Dominas el tema perfectamente.'; }
    else if (pct >= 70) { title = 'Muy bien'; sub = 'Estás cerca del dominio total.'; }
    else if (pct >= 50) { title = 'Aprobado'; sub = 'Repasa los conceptos fallidos.'; }
    else { title = 'A estudiar más'; sub = 'Revisa los temas y vuelve a intentarlo.'; }

    if (pendingWrongQuestions.length > 0) {
      reviewBtn.style.display = 'inline-block';
      sub += ` Tienes ${pendingWrongQuestions.length} pregunta${pendingWrongQuestions.length === 1 ? '' : 's'} pendiente${pendingWrongQuestions.length === 1 ? '' : 's'} para el repaso de falladas.`;
    } else {
      reviewBtn.style.display = 'none';
      sub += ' No te ha quedado ninguna pendiente.';
    }
  } else {
    if (pendingWrongQuestions.length === 0) {
      title = '¡Falladas superadas!';
      sub = `Has completado el repaso ${reviewRound} y ya no quedan preguntas pendientes.`;
      reviewBtn.style.display = 'none';
    } else {
      title = `Repaso ${reviewRound} completado`;
      sub = `Has corregido ${correctCount} de ${total}. Quedan ${pendingWrongQuestions.length} pregunta${pendingWrongQuestions.length === 1 ? '' : 's'} por dominar.`;
      reviewBtn.style.display = 'inline-block';
    }
  }

  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = `${correctCount} de ${total} correctas · ${sub}`;

  const wr = document.getElementById('wrong-review');
  wr.innerHTML = '';
  if (wrongItems.length > 0) {
    const heading = currentPhase === 'initial'
      ? `✗ Preguntas falladas o pendientes (${wrongItems.length + skipCount})`
      : `✗ Preguntas aún falladas en el repaso (${wrongItems.length})`;
    wr.innerHTML = `<h3>${heading}</h3>`;

    wrongItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `
        <div class="wi-question">[${item.module}] ${item.q}</div>
        <div class="wi-your">Tu respuesta: ${item.your}</div>
        <div class="wi-correct">Correcta: ${item.correct}</div>
      `;
      wr.appendChild(div);
    });

    if (currentPhase === 'initial' && skipCount > 0) {
      const skippedKeys = new Set(wrongItems.map(item => `${item.module}|||${item.q}`));
      currentQuestions.forEach((q, index) => {
        if (index < currentQuestions.length && skippedKeys.has(questionKey(q))) return;
      });
    }
  }

  if (currentPhase === 'initial' && skipCount > 0) {
    const answeredKeys = new Set(wrongItems.map(item => `${item.module}|||${item.q}`));
    const skippedQuestions = currentQuestions.filter((q, idx) => {
      return !answeredKeys.has(questionKey(q)) && idx >= currentQuestions.length - skipCount ? false : false;
    });

    const pendingKeys = new Set(pendingWrongQuestions.map(questionKey));
    const alreadyShown = new Set(wrongItems.map(item => `${item.module}|||${item.q}`));
    pendingWrongQuestions.forEach(q => {
      const key = questionKey(q);
      if (alreadyShown.has(key)) return;
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `
        <div class="wi-question">[${q.module}] ${q.q}</div>
        <div class="wi-your">Sin responder</div>
        <div class="wi-correct">Se repite en el repaso de falladas</div>
      `;
      wr.appendChild(div);
      alreadyShown.add(key);
    });
  }
}

function startWrongReview() {
  if (pendingWrongQuestions.length === 0) return;
  currentPhase = 'review';
  reviewRound++;
  const unique = [];
  const seen = new Set();
  pendingWrongQuestions.forEach(q => {
    const key = questionKey(q);
    if (!seen.has(key)) {
      unique.push(cloneQuestion(q));
      seen.add(key);
    }
  });
  pendingWrongQuestions = [];
  setupRound(shuffle(unique));
}

function retryQuiz() {
  if (currentPhase === 'initial') {
    setupRound(shuffle(lastInitialPool.map(cloneQuestion)));
  } else {
    if (currentMode === 'all') startQuiz('all');
    else startQuiz(currentMode);
  }
}

function showMenu() {
  currentPhase = 'initial';
  reviewRound = 0;
  pendingWrongQuestions = [];
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('module-selector').style.display = 'flex';
  document.getElementById('header-score').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('btn-review-wrong').style.display = 'none';
}

function goBack() {
  showMenu();
}
buildModuleSelector();
</script>
</body>
</html>
